<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Partners | 스탠다드파트너스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide 아이콘 컴포넌트 래퍼
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconSvg, setIconSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = window.lucide.createIcons();
                    }
                }
            }, [name]);
            
            // 직접 SVG 경로를 그리는 대신 Lucide 아이콘 태그 활용
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [lang, setLang] = useState('ko');
            const [activeTab, setActiveTab] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                {
                    img: "https://iili.io/qBTDpQ1.png",
                    ko: "Standard Partners, 고객을 위한 금융 솔루션을 가장 정확하게 연결하는 전문 금융 파트너입니다.",
                    ru: "Standard Partners — профессиональный финансовый партнёр, который наиболее точно подбирает финансовые решения для клиентов."
                },
                {
                    img: "https://iili.io/q1kJpQ1.jpg",
                    ko: "다양한 은행과 캐피탈사와의 협력 네트워크를 통해 고객 상황에 맞는 금융기관과 대출 상품을 연결합니다.",
                    ru: "Standard Partners через сеть партнёрства с различными банками подбирает и соединяет клиентов с кредитными продуктами."
                },
                {
                    img: "https://iili.io/q1kqz67.jpg",
                    ko: "단순한 대출 연결이 아닌 고객에게 맞는 금융 전략을 설계하는 금융 파트너입니다.",
                    ru: "Standard Partners разрабатывает финансовую стратегию, наиболее подходящую именно для клиента."
                },
                {
                    img: "https://iili.io/q1kIRf4.jpg",
                    ko: "누적금액 550억원의 부동산 PF 경험을 기반으로 전문적인 금융 구조 설계 역량을 보유하고 있습니다.",
                    ru: "Standard Partners обладает экспертизой в проектном финансировании недвижимости (PF)."
                },
                {
                    img: "https://iili.io/q1kvM0b.jpg",
                    ko: "외국인 금융 규정과 시장 환경에 대한 이해를 바탕으로 외국인 특화 금융 서비스를 제공합니다.",
                    ru: "Standard Partners предоставляет специализированные услуги для иностранных клиентов."
                },
                {
                    img: "https://iili.io/q1vH0hP.jpg",
                    ko: "외국인 대상 신용대출 및 자동차 담보대출 중개 분야의 전문 인력을 보유하고 있습니다.",
                    ru: "Индивидуальные консультации по кредитам для иностранцев."
                },
                {
                    img: "https://iili.io/q1vKzQV.jpg",
                    ko: "상담 접수부터 대출 실행까지 체계적인 프로세스를 통해 안정적인 진행을 지원합니다.",
                    ru: "Надёжное сопровождение кредита от заявки до получения займа."
                },
                {
                    img: "https://iili.io/q1vIou9.png",
                    ko: "더 나은 금융 선택을 위한 가장 가까운 파트너, 스탠다드 파트너스입니다.",
                    ru: "Standard Partners — ваш самый близкий партнёр для финансового выбора."
                }
            ];

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % slides.length);
                }, 5000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, mobileMenuOpen, currentSlide]);

            const t = {
                ko: {
                    nav: ["회사소개", "VISION", "사업영역", "파트너쉽", "진행과정"],
                    consultBtn: "상담신청",
                    phoneBtn: "전화상담",
                    aboutTitle: "안녕하십니까. 스탠다드파트너스 홈페이지를 방문해 주셔서 감사합니다.",
                    aboutContent: "스탠다드파트너스는 고객에게 가장 적합한 금융 솔루션을 제공하기 위해 설립된 금융 중개 전문 기업입니다. 다양한 금융기관과의 협력 네트워크를 기반으로 고객의 상황과 목적에 맞는 금융 상품을 연결하고 있습니다.",
                    visionDesc: "외국인 금융 서비스 분야에서 신뢰 받는 전문 금융 플랫폼 기업이 되는 것을 목표로 합니다.",
                    partnershipTitle: "주요제휴금융기관",
                    process1: "대출상담",
                    process2: "대출심사신청",
                    process3: "대출결과전달",
                    process4: "대출실행"
                },
                ru: {
                    nav: ["О компании", "ВИДЕНИЕ", "Направления", "Партнёрство", "Процесс"],
                    consultBtn: "Заявка",
                    phoneBtn: "Консультация",
                    aboutTitle: "Здравствуйте. Благодарим вас за посещение Standard Partners.",
                    aboutContent: "Standard Partners — это компания по финансовому посредничеству, созданная для предоставления наиболее подходящих решений.",
                    visionDesc: "Наша цель — стать ведущей финансовой платформой, которой доверяют иностранные клиен티.",
                    partnershipTitle: "Финансовые партнеры",
                    process1: "Консультация",
                    process2: "Подача заявки",
                    process3: "Результат",
                    process4: "Выплата"
                }
            };

            const navigateTo = (id) => {
                setActiveTab(id);
                setMobileMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-white">
                    {/* Header */}
                    <nav className="fixed top-0 w-full bg-white z-50 border-b shadow-sm h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <img src="https://iili.io/qKNSOUx.png" className="h-10 cursor-pointer" onClick={() => navigateTo('home')} />
                            
                            <div className="hidden lg:flex items-center space-x-6">
                                {t.ko.nav.map((label, i) => (
                                    <button key={i} onClick={() => navigateTo(['about', 'vision', 'business', 'partnership', 'process'][i])} className="text-sm font-medium hover:text-[#800020]">
                                        {lang === 'ko' ? label : t.ru.nav[i]}
                                    </button>
                                ))}
                                <div className="flex space-x-2 border-l pl-4">
                                    <button onClick={() => setLang('ko')} className={`text-xs ${lang === 'ko' ? 'font-bold' : 'text-gray-400'}`}>KO</button>
                                    <button onClick={() => setLang('ru')} className={`text-xs ${lang === 'ru' ? 'font-bold' : 'text-gray-400'}`}>RU</button>
                                </div>
                                <div className="flex space-x-2">
                                    <a href="tel:010-9526-2292" className="border-2 border-[#800020] text-[#800020] px-4 py-2 rounded-full text-xs font-bold hover:bg-[#800020] hover:text-white transition-all">
                                        {t[lang].phoneBtn}
                                    </a>
                                    <a href="https://standardpartners.github.io/home/" className="bg-[#800020] text-white px-4 py-2 rounded-full text-xs font-bold shadow-md">
                                        {t[lang].consultBtn}
                                    </a>
                                </div>
                            </div>

                            <button className="lg:hidden" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <i data-lucide={mobileMenuOpen ? "x" : "menu"}></i>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="fixed inset-0 bg-white z-40 pt-24 px-6 lg:hidden">
                            <div className="flex flex-col space-y-4">
                                {t.ko.nav.map((label, i) => (
                                    <button key={i} onClick={() => navigateTo(['about', 'vision', 'business', 'partnership', 'process'][i])} className="text-left text-lg font-bold border-b pb-2">
                                        {lang === 'ko' ? label : t.ru.nav[i]}
                                    </button>
                                ))}
                                <div className="flex space-x-4 pt-4">
                                    <a href="tel:010-9526-2292" className="flex-1 text-center border-2 border-[#800020] text-[#800020] py-3 rounded-xl font-bold">{t[lang].phoneBtn}</a>
                                    <a href="https://standardpartners.github.io/home/" className="flex-1 text-center bg-[#800020] text-white py-3 rounded-xl font-bold">{t[lang].consultBtn}</a>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content */}
                    <main className="pt-20">
                        {activeTab === 'home' && (
                            <section className="relative h-[calc(100vh-80px)] overflow-hidden bg-black">
                                {slides.map((slide, i) => (
                                    <div key={i} className={`absolute inset-0 transition-opacity duration-1000 ${i === currentSlide ? 'opacity-100' : 'opacity-0'}`}>
                                        <div className="absolute inset-0 bg-cover bg-center opacity-60" style={{backgroundImage: `url(${slide.img})`}}></div>
                                        <div className="relative h-full flex items-center justify-center text-center px-6">
                                            <h1 className="text-white text-xl md:text-3xl font-bold leading-relaxed max-w-4xl">
                                                {lang === 'ko' ? slide.ko : slide.ru}
                                            </h1>
                                        </div>
                                    </div>
                                ))}
                            </section>
                        )}

                        {activeTab === 'about' && (
                            <section className="py-20 px-6 animate-fadeIn max-w-4xl mx-auto text-center">
                                <img src="https://iili.io/q18ahDQ.png" className="w-48 h-48 mx-auto rounded-full shadow-xl mb-8 object-cover" />
                                <h2 className="text-2xl font-bold text-[#800020] mb-8">{t[lang].aboutTitle}</h2>
                                <p className="text-gray-600 leading-loose">{t[lang].aboutContent}</p>
                                <p className="mt-12 font-bold text-xl">대표 김민정</p>
                            </section>
                        )}

                        {activeTab === 'process' && (
                            <section className="py-20 px-6 bg-gray-50 animate-fadeIn">
                                <div className="max-w-6xl mx-auto text-center">
                                    <h2 className="text-3xl font-bold mb-12">{lang === 'ko' ? "진행과정" : "Процесс"}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        {[
                                            {step: "01", icon: "phone-call", title: t[lang].process1},
                                            {step: "02", icon: "file-text", title: t[lang].process2},
                                            {step: "03", icon: "check-circle-2", title: t[lang].process3},
                                            {step: "04", icon: "banknote", title: t[lang].process4}
                                        ].map((item, i) => (
                                            <div key={i} className="bg-white p-8 rounded-2xl shadow-sm relative group hover:bg-[#800020] transition-all duration-300">
                                                <span className="absolute top-2 right-4 text-5xl font-black text-gray-100 group-hover:text-white/10">{item.step}</span>
                                                <div className="relative z-10 flex flex-col items-center">
                                                    <div className="mb-4 text-[#800020] group-hover:text-white">
                                                        <i data-lucide={item.icon} style={{width: 40, height: 40}}></i>
                                                    </div>
                                                    <h3 className="font-bold text-lg group-hover:text-white">{item.title}</h3>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        )}
                        
                        {/* 다른 섹션들(Vision, Business, Partnership)도 유사한 방식으로 activeTab에 따라 렌더링 가능 */}
                    </main>

                    {/* Footer - 고정 한국어 */}
                    <footer className="bg-slate-900 text-slate-400 py-12 px-6">
                        <div className="max-w-7xl mx-auto">
                            <p className="text-white font-bold mb-4">(주)스탠다드파트너스(Srandard Partners Co., Ltd)</p>
                            <div className="text-sm space-y-1">
                                <p>등록번호 : 840-88-02840 | 대표자 : 김민정</p>
                                <p>소재지 : 인천 남동구 남동서로236번길 30, 2층</p>
                                <p>email : srandardpartnerskor@gmail.com</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
