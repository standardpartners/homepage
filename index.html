<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Standard Partners | 스탠다드파트너스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Noto Sans KR & Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans KR', 'Roboto', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden; /* 가로 스크롤 방지 */
            width: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }
        .hero-slide {
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        /* Lucide 아이콘 크기 고정 */
        [data-lucide] {
            width: 24px;
            height: 24px;
        }
        .process-icon [data-lucide] {
            width: 32px;
            height: 32px;
        }
        .hero-nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .hero-nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        /* 러시아어 가독성을 위한 정렬 설정 */
        .lang-ru .about-text {
            text-align: justify;
            text-justify: inter-word;
        }
        /* 모바일에서 문구가 짤리지 않게 방지 */
        .keep-all {
            word-break: keep-all;
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [lang, setLang] = useState('ko');
            const [activeTab, setActiveTab] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);

            // 데이터 정의
            const slides = [
                { 
                    img: "https://iili.io/qBTDpQ1.png", 
                    ko: "Standard Partners,\n고객을 위한 금융 솔루션을\n가장 정확하게 연결하는 전문 금융 파트너입니다.", 
                    ru: "Standard Partners — ваш финансовый партнер,\nобеспечивающий максимально точный подбор\nфинансовых решений для клиентов." 
                },
                { 
                    img: "https://iili.io/q1kJpQ1.jpg", 
                    ko: "다양한 은행과 캐피탈사와의 협력 네트워크를 통해\n고객 상황에 맞는 금융기관과\n대출 상품을 정확하게 연결합니다.", 
                    ru: "Благодаря широкой сети партнерства\nмы подбираем оптимальные продукты,\nсоответствующие вашей ситуации." 
                },
                { 
                    img: "https://iili.io/q1kqz67.jpg", 
                    ko: "단순한 대출 연결이 아닌\n고객에게 맞는 최적의 금융 전략을 설계하는\n진정한 금융 파트너입니다.", 
                    ru: "Мы не просто помогаем получить кредит —\nмы разрабатываем индивидуальную стратегию\nспециально для каждого клиента." 
                },
                { 
                    img: "https://iili.io/q1kIRf4.jpg", 
                    ko: "부동산 PF 550억 경험을 기반으로\n프로젝트 특성에 맞는\n전문적인 금융 구조 설계 역량을 보유하고 있습니다.", 
                    ru: "На основе опыта PF в 55 млрд вон,\nмы обладаем экспертными навыками в\nпроектировании финансовых структур." 
                },
                { 
                    img: "https://iili.io/q1kvM0b.jpg", 
                    ko: "외국인 금융 규정에 대한 이해를 바탕으로\n외국인 고객에게 특화된\n맞춤형 금융 서비스를 제공합니다.", 
                    ru: "Мы предоставляем специализированные услуги\nдля иностранцев, опираясь на глубокое\nпонимание местного законодательства." 
                },
                { 
                    img: "https://iili.io/q1vH0hP.jpg", 
                    ko: "외국인 대상 신용 및 자동차 대출 중개 분야의\n전문 인력을 통해\n체계적인 상담을 도와드립니다.", 
                    ru: "Наши специалисты по кредитам для иностранцев\nвсегда готовы предоставить вам\nпрофессиональную консультацию." 
                },
                { 
                    img: "https://iili.io/q1vKzQV.jpg", 
                    ko: "상담 접수부터 대출 실행까지\n안정적인 프로세스를 통해\n신속한 금융 진행을 지원합니다.", 
                    ru: "Мы гарантируем надежное сопровождение процесса\nкредитования благодаря нашей\nчетко выстроенной системе." 
                },
                { 
                    img: "https://iili.io/q1vIou9.png", 
                    ko: "더 나은 금융 선택을 위한\n가장 가까운 파트너,\n스탠다드 파트너스입니다.", 
                    ru: "Standard Partners — ваш самый надежный партнер\nна пути к принятию верных\nфинансовых решений." 
                }
            ];

            const t = {
                ko: {
                    nav: ["회사소개", "VISION", "사업영역", "파트너쉽", "진행과정"],
                    consultBtn: "상담신청",
                    repName: "김민정",
                    aboutTitle: "안녕하십니까. 스탠다드파트너스 공식 홈페이지를 방문해 주셔서 진심으로 감사드립니다.",
                    aboutP1: "스탠다드파트너스는 고객에게 가장 적합한 금융 솔루션을 제공하기 위해 설립된 금융 중개 전문 기업입니다. 다양한 금융기관과의 협력 네트워크를 기반으로 고객의 상황과 목적에 맞는 금융 상품을 연결하고, 보다 효율적인 자금 조달 방법을 제안하고 있습니다.",
                    aboutP2: "금융 서비스는 단순한 상품 제공을 넘어 고객의 신뢰를 바탕으로 이루어야 한다고 생각합니다. 스탠다드파트너스는 고객 한 분 한 분의 상황을 충분히 이해하고, 가장 합리적이고 안정적인 금융 선택을 할 수 있도록 돕는 것을 최우선 가치로 삼고 있습니다.",
                    aboutP3: "또한 빠르게 변화하는 금융 환경 속에서 전문성과 책임감을 바탕으로 고객에게 신뢰할 수 있는 금융 서비스를 제공하고, 금융기관과 고객을 연결하는 든든한 파트너가 되기 위해 노력하고 있습니다.",
                    aboutP4: "앞으로도 스탠다드파트너스는 고객 중심의 금융 서비스를 통해 더 나은 금융 경험을 제공하는 기업으로 성장해 나가겠습니다. 감사합니다.",
                    visionMain: "신뢰성 있는 국내외 금융 네트워크를 기반으로 외국인 고객에게 최적의 서비스를 제공하여 외국인 금융 서비스 분야에서 신뢰 받는 전문 금융 플랫폼 기업이 되는 것을 목표로 합니다.",
                    vision1: "외국인 금융서비스 분야 선도 기업",
                    vision2: "신뢰성 있는 국내외 금융네트워크 기반 플랫폼 구축",
                    vision3: "외국인 신뢰도 1위 기업",
                    biz1: "외국인 대출 금융 중개",
                    biz1Desc: "외국인 고객을 대상으로 신용 및 자동차 담보 대출 중개 서비스를 제공하며, 금융 규정 이해를 바탕으로 최적의 상품을 연결합니다.",
                    biz2: "부동산 PF 금융 자문 및 중개",
                    biz2Desc: "부동산 개발 프로젝트 맞춤형 금융 구조를 설계하고, 협력 네트워크를 통해 안정적인 자금 조달을 지원합니다.",
                    biz3: "금융 구조 설계 및 컨설팅",
                    biz3Desc: "사업성 분석을 기반으로 최적의 금융 구조를 설계하고 고객에게 효율적인 자금 조달 전략을 제공합니다.",
                    partnerTitle: "주요제휴금융기관",
                    partnerDesc: "당사는 국내 주요 금융기관 및 여신전문금융회사와의 파트너십을 기반으로 다양한 금융 상품과 서비스를 제공합니다.",
                    process1: "대출상담",
                    process1Desc: "대출전문상담사가 직접 상담을 진행하며 상황과 조건을 파악합니다. (러시아어, 중국어, 영어 가능)",
                    process2: "대출심사신청",
                    process2Desc: "파악된 정보를 바탕으로 고객님에게 맞는 대출금융기관에 심사를 신청합니다.",
                    process3: "대출결과전달",
                    process3Desc: "한도, 금리, 기간 등 자세한 심사 결과를 알려드리고 대출진행여부를 결정합니다.",
                    process4: "대출실행",
                    process4Desc: "대출 최종 심사 후 대출금이 입금됩니다."
                },
                ru: {
                    nav: ["О компании", "ВИДЕНИЕ", "Направления", "Партнерство", "Процесс"],
                    consultBtn: "Заявка",
                    repName: "Ким Мин Чжон",
                    aboutTitle: "Здравствуйте. Искренне благодарим вас за посещение официального сайта Standard Partners.",
                    aboutP1: "Standard Partners — специализированная компания в сфере финансового посредничества, созданная для предоставления клиентам оптимальных решений. Мы подбираем кредитные продукты, соответствующие целям каждого клиента.",
                    aboutP2: "Мы убеждены, что финансовые услуги должны основываться на доверии. Наш приоритет — глубокое понимание ситуации каждого клиента и помощь в принятии максимально рационального и надежного финансового выбора.",
                    aboutP3: "В условиях быстро меняющегося рынка мы стремимся быть надежным партнером, обеспечивая профессиональный и ответственный подход к предоставлению услуг.",
                    aboutP4: "Standard Partners продолжит развиваться как клиентоориентированная компания, предоставляя исключительный опыт в сфере финансов. Благодарим вас.",
                    visionMain: "Наша цель — стать ведущей финансовой платформой, которой доверяют иностранные клиенты, предоставляя услуги высочайшего качества на базе надежной сети.",
                    vision1: "Лидер в финансовых услугах для иностранцев",
                    vision2: "Создание платформы на базе надежной сети",
                    vision3: "Компания №1 по уровню доверия клиентов",
                    biz1: "Кредитное посредничество для иностранцев",
                    biz1Desc: "Предоставление услуг по кредитованию (беззалоговые и автозалоговые кредиты) с учетом индивидуальных условий и норм.",
                    biz2: "Консалтинг в сфере недвижимости (PF)",
                    biz2Desc: "Проектирование финансовых структур для девелоперских проектов и поддержка в привлечении финансирования (PF).",
                    biz3: "Проектирование структур и консалтинг",
                    biz3Desc: "Анализ бизнес-потенциала проектов для разработки оптимальных стратегий финансирования и привлечения капитала.",
                    partnerTitle: "Ключевые партнеры",
                    partnerDesc: "Мы предоставляем широкий спектр финансовых продуктов на основе партнерства с ведущими учреждениями Кореи.",
                    process1: "Консультация",
                    process1Desc: "Специалист изучит вашу ситуацию. Доступны консультации на русском, китайском и английском языках.",
                    process2: "Подача заявки",
                    process2Desc: "Мы подаем заявку в финансовое учреждение, наиболее подходящее вашим критериям.",
                    process3: "Результат",
                    process3Desc: "Мы сообщим вам подробности (лимит, ставка, срок), после чего вы принимаете решение.",
                    process4: "Выплата",
                    process4Desc: "После окончательного одобрения кредитные средства зачисляются на ваш банковский счет."
                }
            };

            // 자동 슬라이드 타이머
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % slides.length);
                }, 5000);
                return () => clearInterval(timer);
            }, [slides.length]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, mobileMenuOpen, lang, currentSlide]);

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);

            const navigateTo = (id) => {
                setActiveTab(id);
                setMobileMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className={`min-h-screen w-full overflow-x-hidden ${lang === 'ru' ? 'lang-ru' : ''}`}>
                    {/* Header: Increased Height and Scaled Elements */}
                    <nav className="fixed top-0 w-full bg-white z-50 border-b border-gray-100 shadow-sm h-20 md:h-28 flex items-center">
                        <div className="max-w-7xl mx-auto px-3 md:px-6 w-full flex justify-between items-center">
                            {/* Logo: Increased Height */}
                            <div className="flex-shrink-0 mr-2 md:mr-6">
                                <img src="https://iili.io/qKNSOUx.png" alt="Logo" className="h-12 md:h-20 cursor-pointer object-contain" onClick={() => navigateTo('home')} />
                            </div>
                            
                            {/* Desktop Menu - Hidden on Mobile */}
                            <div className="hidden lg:flex items-center space-x-6 xl:space-x-10">
                                {t.ko.nav.map((label, i) => (
                                    <button key={i} onClick={() => navigateTo(['about', 'vision', 'business', 'partnership', 'process'][i])} 
                                            className={`text-[17px] font-bold transition-all hover:text-[#800020] ${activeTab === ['about', 'vision', 'business', 'partnership', 'process'][i] ? 'text-[#800020]' : 'text-slate-600'}`}>
                                        {lang === 'ko' ? label : t.ru.nav[i]}
                                    </button>
                                ))}
                            </div>

                            {/* Common Action Area: Scaled Up Buttons */}
                            <div className="flex items-center space-x-2 md:space-x-5">
                                {/* Language Buttons: Increased Size and Font */}
                                <div className="flex items-center space-x-1.5 md:space-x-3">
                                    <button 
                                        onClick={() => setLang('ko')} 
                                        className={`w-18 md:w-32 h-10 md:h-14 flex items-center justify-center rounded-full text-[11px] md:text-base font-bold shadow-sm transition-all border-2 ${lang === 'ko' ? 'bg-[#800020] text-white border-[#800020]' : 'bg-white text-slate-500 border-slate-200 hover:border-[#800020]'}`}
                                    >
                                        한국어
                                    </button>
                                    <button 
                                        onClick={() => setLang('ru')} 
                                        className={`w-18 md:w-32 h-10 md:h-14 flex items-center justify-center rounded-full text-[11px] md:text-base font-bold shadow-sm transition-all border-2 ${lang === 'ru' ? 'bg-[#800020] text-white border-[#800020]' : 'bg-white text-slate-500 border-slate-200 hover:border-[#800020]'}`}
                                    >
                                        Русский
                                    </button>
                                </div>

                                {/* Application Button: Scaled Up Height and Font */}
                                <a href="https://standardpartners.github.io/home/" target="_blank" className="bg-[#800020] text-white px-4 md:px-8 h-10 md:h-14 flex items-center justify-center rounded-full text-[11px] md:text-lg font-black shadow-md hover:bg-[#600018] transition-all">
                                    {t[lang].consultBtn}
                                </a>
                                
                                {/* Hamburger Menu Icon (Mobile Only) */}
                                <button className="lg:hidden p-1.5 flex-shrink-0" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                    <i data-lucide={mobileMenuOpen ? "x" : "menu"} className="w-8 h-8"></i>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {mobileMenuOpen && (
                        <div className="fixed inset-0 bg-white z-40 pt-24 px-6 lg:hidden animate-fadeIn w-full h-full overflow-y-auto">
                            <div className="flex flex-col space-y-6 pb-10">
                                {t.ko.nav.map((label, i) => (
                                    <button key={i} onClick={() => navigateTo(['about', 'vision', 'business', 'partnership', 'process'][i])} 
                                            className="text-left text-xl font-black border-b border-gray-100 pb-4 text-slate-800">
                                        {lang === 'ko' ? label : t.ru.nav[i]}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="pt-20 md:pt-28 w-full">
                        {activeTab === 'home' && (
                            <section className="relative h-[480px] sm:h-[550px] md:h-[calc(100vh-112px)] overflow-hidden bg-black w-full">
                                {slides.map((slide, i) => (
                                    <div key={i} className={`absolute inset-0 hero-slide ${i === currentSlide ? 'opacity-100 scale-100' : 'opacity-0 scale-105'}`}>
                                        <div 
                                            className="absolute inset-0 bg-cover bg-center md:bg-cover bg-no-repeat" 
                                            style={{backgroundImage: `linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)), url(${slide.img})`}}
                                        ></div>
                                        <div className="relative h-full flex flex-col items-center justify-center text-center px-4 md:px-6">
                                            <h1 className="text-white text-lg md:text-3xl lg:text-4xl font-black leading-relaxed max-w-5xl whitespace-pre-wrap drop-shadow-2xl keep-all">
                                                {lang === 'ko' ? slide.ko : slide.ru}
                                            </h1>
                                        </div>
                                    </div>
                                ))}

                                {/* Manual Slide Navigation */}
                                <button onClick={prevSlide} className="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 rounded-full hero-nav-btn text-white flex items-center justify-center z-20">
                                    <i data-lucide="chevron-left" className="w-5 h-5 md:w-8 md:h-8"></i>
                                </button>
                                <button onClick={nextSlide} className="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 rounded-full hero-nav-btn text-white flex items-center justify-center z-20">
                                    <i data-lucide="chevron-right" className="w-5 h-5 md:w-8 md:h-8"></i>
                                </button>

                            <div className="space-y-6">
                                <img src="https://iili.io/qKNSOUx.png" className="h-10 md:h-12 brightness-0 invert opacity-80" />
